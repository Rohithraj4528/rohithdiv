<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌌 Background */
body{
margin:0;
font-family:Poppins,sans-serif;
background: radial-gradient(circle at top,#1a001f,#000010);
color:white;
overflow:hidden;
}

/* ❤️ Hearts */
.heart{
position:fixed;
bottom:-20px;
color:#ff4d88;
font-size:18px;
animation:floatUp 6s linear infinite;
opacity:0.7;
}

@keyframes floatUp{
0%{transform:translateY(0); opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-110vh); opacity:0;}
}

/* 📸 Container */
.container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

/* 💖 Title */
h1{
font-family:'Great Vibes',cursive;
font-size:60px;
text-shadow:0 0 20px #ff4d88;
margin-bottom:10px;
}

/* 💍 TOP BUTTON CONTAINER */
.top-btn{
margin-bottom:20px;
}

/* 🔘 Button */
.btn{
padding:12px 30px;
border:none;
border-radius:50px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(45deg,#ff4d88,#ff99cc);
color:white;
transition:0.3s;
box-shadow:0 0 20px rgba(255,77,136,0.4);
}

.btn:hover{
transform:scale(1.1);
}

/* 🖼️ Card */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
width:90%;
max-width:700px;
box-shadow:0 0 30px rgba(255,77,136,0.3);
transition:1s;
}

/* 📸 Image */
.card img{
width:100%;
height:420px;
object-fit:cover;
border-radius:20px;
transition:1s ease;
}

/* 💌 Caption */
.caption{
margin-top:15px;
font-size:18px;
line-height:1.7;
min-height:60px;
}

/* 🔘 Buttons */
.buttons{
margin-top:20px;
display:flex;
gap:15px;
}

/* ✨ Fade */
.fade{
opacity:0;
transform:scale(0.95);
transition:0.6s ease;
}

.show{
opacity:1;
transform:scale(1);
}

</style>

</head>

<body>

<div class="container">

<!-- ❤️ TOP BUTTON (NOW AT TOP) -->
<div class="top-btn">
<a href="forever.html" style="text-decoration:none;">
<button class="btn heartbeat">
Divya, see here ❤️
</button>
</a>
</div>

<h1>Our Beautiful Memories ❤️</h1>

<div class="card fade show">

<img id="photo" src="images/photo1.jpg">

<div class="caption" id="caption">
Every love story begins somewhere… ours began with a smile. ❤️
</div>

</div>

<div class="buttons">

<button class="btn" onclick="prev()">⬅ Previous</button>
<button class="btn" onclick="next()">Next ➡</button>

</div>

</div>

<script>

/* ❤️ Hearts */
function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(14+Math.random()*20)+"px";
heart.style.animationDuration=(4+Math.random()*3)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,300);

/* 📸 Gallery */
const photos=[
"images/photo1.jpg",
"images/photo2.jpg",
"images/photo3.jpg",
"images/photo4.jpg",
"images/photo5.jpg"
];

const captions=[
"Every love story begins somewhere… ours began with a smile. ❤️",
"You are my favorite place to go when my mind searches for peace. 🌹",
"Every moment with you becomes a memory I never want to forget. 💖",
"You and me… that’s my favorite story. ✨",
"No matter where life takes us, these memories will always stay. ❤️"
];

let index=0;

function show(){
const img=document.getElementById("photo");
const cap=document.getElementById("caption");

img.classList.remove("show");
cap.classList.remove("show");

setTimeout(()=>{
img.src=photos[index];
cap.innerHTML=captions[index];

img.classList.add("show");
cap.classList.add("show");
},300);
}

function next(){
index=(index+1)%photos.length;
show();
}

function prev(){
index=(index-1+photos.length)%photos.length;
show();
}

</script>

</body>
</html>
